<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1a1a1a;
            --accent-red: #cc0000;
            --text-color: #e0e0e0;
        }
        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(204, 0, 0, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(204, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }
        .container {
            background: var(--container-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .hidden { display: none; }
        h1, h2 { margin-top: 0; color: #fff; }
        input, button { 
            padding: 0.8rem; 
            margin: 0.5rem 0; 
            border: 1px solid #333; 
            background: #0a0a0a; 
            color: #fff; 
            border-radius: 6px;
            font-size: 1rem;
        }
        button { 
            background: var(--accent-red); 
            border: none; 
            cursor: pointer; 
            font-weight: 600;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 2rem 0; }
        .stat-box { background: #222; padding: 1.5rem; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .stat-val { display: block; font-size: 1.5rem; font-weight: 700; color: var(--accent-red); margin-top: 0.5rem; }
        .key-list { margin-top: 2rem; border: 1px solid #333; border-radius: 8px; overflow: hidden; background: #0a0a0a; }
        .key-item { display: flex; justify-content: space-between; padding: 1rem; border-bottom: 1px solid #222; }
        .key-item:last-child { border-bottom: none; }
        .claimed { color: #555; }
        .timestamp { font-size: 0.8rem; color: #888; }
        
        #popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1a; border: 1px solid var(--accent-red); padding: 2rem;
            border-radius: 12px; z-index: 100; box-shadow: 0 0 100px rgba(0,0,0,0.8);
            width: 90%; max-width: 400px;
        }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 90; }
    </style>
</head>
<body>
    <div id="login-view" class="container" style="max-width: 400px; margin-top: 10vh;">
        <h2>Admin Access</h2>
        <input type="password" id="admin-pass" placeholder="Enter Password" style="width: 100%; box-sizing: border-box;">
        <button id="verify-btn" style="width: 100%;">Verify Session</button>
        <p id="login-error" style="color: var(--accent-red); font-size: 0.9rem; text-align: center; margin-top: 1rem;"></p>
    </div>

    <div id="admin-view" class="container hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>System Dashboard</h2>
            <button id="logout-btn" style="background: transparent; border: 1px solid #444; padding: 0.4rem 1rem; font-size: 0.8rem;">Logout</button>
        </div>
        
        <div class="stats">
            <div class="stat-box">Available Keys<span class="stat-val" id="total-keys">0</span></div>
            <div class="stat-box">Total Claimed<span class="stat-val" id="claimed-keys">0</span></div>
            <div class="stat-box">Last 24h<span class="stat-val" id="last-24h">0</span></div>
        </div>

        <div style="display: flex; gap: 1rem;">
            <button id="add-keys-btn">Add Keys from Textfile</button>
            <button id="delete-all-btn" style="background: transparent; border: 1px solid #444;">Wipe All Data</button>
        </div>

        <input type="text" id="search-bar" placeholder="Filter keys..." style="width: 100%; box-sizing: border-box; margin-top: 2rem;">
        
        <div class="key-list" id="key-list"></div>
    </div>

    <div id="overlay" class="overlay hidden"></div>
    <div id="popup" class="hidden">
        <h3>Upload Settings</h3>
        <p style="color: #aaa; font-size: 0.9rem;">Clean up claimed keys after:</p>
        <input type="text" id="expiry-input" placeholder="e.g. 24h, 7d, 30m" style="width: 100%; box-sizing: border-box;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
            <button id="confirm-upload">Upload Now</button>
            <button id="cancel-upload" style="background: #333;">Cancel</button>
        </div>
    </div>

    <input type="file" id="file-input" class="hidden" accept=".txt">

    <script>
        let authToken = sessionStorage.getItem('admin_token') || "";
        let allKeys = [];

        if (authToken) {
            showAdmin();
        }

        document.getElementById('verify-btn').onclick = async () => {
            const pass = document.getElementById('admin-pass').value;
            try {
                const res = await fetch('/api/admin/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pass })
                });
                const data = await res.json();
                if (data.success) {
                    authToken = pass;
                    sessionStorage.setItem('admin_token', pass);
                    showAdmin();
                } else {
                    document.getElementById('login-error').innerText = "Access Denied: Invalid Password";
                }
            } catch(e) {
                document.getElementById('login-error').innerText = "Connection Error";
            }
        };

        function showAdmin() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            loadDashboard();
        }

        async function loadDashboard() {
            try {
                const res = await fetch('/api/admin/keys', {
                    headers: { 'Authorization': authToken }
                });
                if (res.status === 401) {
                    sessionStorage.removeItem('admin_token');
                    location.reload();
                    return;
                }
                const data = await res.json();
                allKeys = data.keys || [];
                document.getElementById('total-keys').innerText = data.total - data.claimed;
                document.getElementById('claimed-keys').innerText = data.claimed;
                document.getElementById('last-24h').innerText = data.last24h;
                renderKeys();
            } catch(e) {}
        }

        function renderKeys() {
            const list = document.getElementById('key-list');
            const query = document.getElementById('search-bar').value.toLowerCase();
            list.innerHTML = '';
            
            allKeys.filter(k => k.key.toLowerCase().includes(query)).forEach(k => {
                const div = document.createElement('div');
                div.className = 'key-item' + (k.claimed ? ' claimed' : '');
                div.innerHTML = `
                    <span>${k.key}</span>
                    <span class="timestamp">${k.claimedAt ? new Date(k.claimedAt).toLocaleString() : 'Available'}</span>
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('search-bar').oninput = renderKeys;
        document.getElementById('logout-btn').onclick = () => {
            sessionStorage.removeItem('admin_token');
            location.reload();
        };

        let pendingContent = "";
        const fileInput = document.getElementById('file-input');
        document.getElementById('add-keys-btn').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (re) => {
                pendingContent = re.target.result;
                document.getElementById('overlay').classList.remove('hidden');
                document.getElementById('popup').classList.remove('hidden');
            };
            reader.readAsText(file);
        };

        document.getElementById('confirm-upload').onclick = async () => {
            const expiry = document.getElementById('expiry-input').value;
            await fetch('/api/admin/keys/add', {
                method: 'POST',
                headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: pendingContent, expiry })
            });
            closePopup();
            loadDashboard();
        };

        function closePopup() {
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('popup').classList.add('hidden');
            fileInput.value = "";
        }
        document.getElementById('cancel-upload').onclick = closePopup;

        document.getElementById('delete-all-btn').onclick = async () => {
            if (confirm("Delete ALL database entries?")) {
                await fetch('/api/admin/keys/delete-all', {
                    method: 'POST',
                    headers: { 'Authorization': authToken }
                });
                loadDashboard();
            }
        };
    </script>
</body>
</html>
