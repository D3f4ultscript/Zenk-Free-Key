<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenk Key Distribution</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1a1a1a;
            --accent-red: #cc0000;
            --accent-glow: rgba(204, 0, 0, 0.3);
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(204, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(204, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Nebel-Effekt (Glow) */
        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            z-index: -1;
            filter: blur(50px);
        }

        body::after {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            z-index: -1;
            filter: blur(60px);
        }

        .container {
            background: var(--container-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(204, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }

        h1 { 
            font-weight: 700; 
            margin-bottom: 2rem; 
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        button {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            box-shadow: 0 4px 15px rgba(204, 0, 0, 0.2);
        }

        button:hover {
            background: #e60000;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(204, 0, 0, 0.4);
        }

        button:active { transform: translateY(0); }

        #captcha-container, #key-display { display: none; margin-top: 1.5rem; }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 1.5rem 0;
        }

        .emoji-btn {
            font-size: 1.8rem;
            background: #252525;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1;
            box-shadow: none;
        }

        .emoji-btn:hover {
            background: #333;
            border-color: var(--accent-red);
        }

        #key-input {
            background: #0a0a0a;
            color: #fff;
            border: 1px solid #333;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }

        .status { font-size: 0.9rem; margin-top: 1rem; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div id="main-view">
            <h1>Claim Your Key</h1>
            <p style="color: #888; margin-bottom: 2rem;">Click the button below to start the verification process.</p>
            <button id="get-key-btn">Get Free Key</button>
        </div>

        <div id="captcha-container">
            <h3 style="margin-top:0">Verification</h3>
            <p id="captcha-instruction" style="color: #aaa; font-size: 0.9rem;">Select all: <span id="target-emoji" style="font-size: 1.2rem; vertical-align: middle;"></span></p>
            <div class="emoji-grid" id="emoji-grid"></div>
            <p id="captcha-status" class="status"></p>
        </div>

        <div id="key-display">
            <h3 style="margin-top:0">Your Access Key</h3>
            <input type="text" id="key-input" readonly>
            <button id="copy-btn">Copy to Clipboard</button>
            <p id="copy-status" class="status"></p>
        </div>
    </div>

    <script>
        const mainView = document.getElementById('main-view');
        const captchaContainer = document.getElementById('captcha-container');
        const keyDisplay = document.getElementById('key-display');
        const emojiGrid = document.getElementById('emoji-grid');
        const targetEmojiSpan = document.getElementById('target-emoji');
        const captchaStatus = document.getElementById('captcha-status');
        const keyInput = document.getElementById('key-input');
        
        let clicksNeeded = 0;
        let clicksDone = 0;

        document.getElementById('get-key-btn').onclick = () => {
            mainView.style.display = 'none';
            captchaContainer.style.display = 'block';
            startCaptcha();
        };

        function startCaptcha() {
            const emojis = ['🍎', '🍌', '🍒', '🍇', '🍉', '🍍', '🥝', '🍓', '🥑', '🍕', '🍔', '🍟', '🍦', '🍩'];
            const target = emojis[Math.floor(Math.random() * emojis.length)];
            targetEmojiSpan.innerText = target;
            
            emojiGrid.innerHTML = '';
            clicksNeeded = 0;
            clicksDone = 0;

            const pool = [];
            for(let i=0; i<9; i++) {
                const isTarget = Math.random() > 0.65;
                const emoji = isTarget ? target : emojis[Math.floor(Math.random() * emojis.length)];
                if (emoji === target) clicksNeeded++;
                pool.push({ emoji, isTarget: emoji === target });
            }

            if (clicksNeeded === 0) {
                pool[Math.floor(Math.random()*9)] = { emoji: target, isTarget: true };
                clicksNeeded = 1;
            }

            pool.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'emoji-btn';
                btn.innerText = item.emoji;
                btn.onclick = () => {
                    if (item.isTarget) {
                        btn.style.borderColor = 'var(--accent-red)';
                        btn.style.background = '#1a0000';
                        btn.disabled = true;
                        clicksDone++;
                        if (clicksDone === clicksNeeded) {
                            fetchKey();
                        }
                    } else {
                        captchaStatus.innerText = 'Incorrect. Try again.';
                        captchaStatus.style.color = 'var(--accent-red)';
                        setTimeout(startCaptcha, 800);
                    }
                };
                emojiGrid.appendChild(btn);
            });
        }

        async function fetchKey() {
            captchaContainer.style.display = 'none';
            keyDisplay.style.display = 'block';
            
            try {
                const res = await fetch('/api/get-key');
                if (!res.ok) throw new Error();
                const data = await res.json();
                keyInput.value = data.key || "EMPTY POOL";
            } catch (e) {
                keyInput.value = "SERVER ERROR";
            }
        }

        document.getElementById('copy-btn').onclick = () => {
            navigator.clipboard.writeText(keyInput.value);
            document.getElementById('copy-status').innerText = 'Copied successfully';
            document.getElementById('copy-status').style.color = '#00ff00';
        };
    </script>
</body>
</html>
